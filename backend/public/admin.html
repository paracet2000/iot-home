<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartHome Admin Schema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn3.devexpress.com/jslib/25.1.6/css/dx.light.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .nav-links {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .nav-links a,
      .nav-links button {
        border: 1px solid rgba(255, 255, 255, 0.45);
        color: #fff;
        background: transparent;
        border-radius: 8px;
        padding: 6px 10px;
        text-decoration: none;
        cursor: pointer;
      }
      .admin-layout {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }
      .admin-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
      }
      .admin-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .admin-field {
        display: grid;
        gap: 6px;
      }
      .admin-field label {
        font-size: 13px;
        color: var(--muted);
      }
      .admin-field input,
      .admin-field select,
      .admin-field textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font: inherit;
      }
      .admin-field textarea {
        min-height: 110px;
        max-height: 180px;
        resize: vertical;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      #rows {
        display: grid;
        gap: 10px;
      }
      .row-head {
        display: grid;
        gap: 10px;
        grid-template-columns: 90px 110px 1fr 100px 130px 220px;
        align-items: end;
      }
      .row-options {
        margin-top: 10px;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .options-toggle {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .field-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .mini-btn {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: #2f3f50;
        cursor: pointer;
        padding: 3px 8px;
        font-size: 12px;
      }
      .row-actions {
        display: grid;
        gap: 6px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .row-actions button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 7px 8px;
        cursor: pointer;
      }
      .hidden {
        display: none;
      }
      @media (max-width: 900px) {
        .admin-grid,
        .row-head,
        .row-options {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="header">
        <h1>Schema Admin</h1>
        <div class="nav-links">
          <a href="/">Dashboard</a>
          <a href="/users">Users</a>
          <button id="btnLogout" type="button">Logout</button>
        </div>
      </div>

      <div class="admin-layout">
        <section class="admin-card">
          <div class="admin-grid">
            <div class="admin-field">
              <label for="apiBaseUrl">API Base URL</label>
              <input id="apiBaseUrl" value="" placeholder="Auto: current origin" />
            </div>
            <div class="admin-field">
              <label for="formSlug">Form Slug</label>
              <input id="formSlug" value="smart-device-main" />
            </div>
            <div class="admin-field">
              <label for="formTitle">Title</label>
              <input id="formTitle" placeholder="Smart Device" />
            </div>
            <div class="admin-field">
              <label for="formDescription">Description</label>
              <input id="formDescription" placeholder="Runtime schema" />
            </div>
          </div>
          <div class="toolbar" style="margin-top: 12px">
            <div id="btnLoad"></div>
            <div id="btnAddRow"></div>
            <div id="btnUpsert"></div>
          </div>
        </section>

        <section class="admin-card">
          <h3 style="margin: 0 0 10px">Div Rows</h3>
          <div id="rows"></div>
        </section>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn3.devexpress.com/jslib/25.1.6/js/dx.all.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
