<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartHome Admin Schema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn3.devexpress.com/jslib/25.1.6/css/dx.light.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="header">
        <h1>Schema Admin</h1>
        <div class="nav-links">
          <a href="/">Dashboard</a>
          <a href="/users">Users</a>
          <button id="btnLogout" type="button">Logout</button>
        </div>
      </div>

      <div class="admin-layout">
        <section class="admin-card">
          <div class="admin-grid">
            <div class="admin-field">
              <label for="apiBaseUrl">API Base URL</label>
              <input id="apiBaseUrl" value="" placeholder="Auto: current origin" />
            </div>
            <div class="admin-field">
              <label for="formSlug">Form Slug</label>
              <input id="formSlug" value="smart-device-main" />
            </div>
            <div class="admin-field">
              <label for="formTitle">Title</label>
              <input id="formTitle" placeholder="Smart Device" />
            </div>
            <div class="admin-field">
              <label for="formDescription">Description</label>
              <input id="formDescription" placeholder="Runtime schema" />
            </div>
          </div>
          <div class="toolbar toolbar-top">
            <div id="btnLoad"></div>
            <div id="btnAddRow"></div>
            <div id="btnUpsert"></div>
          </div>
        </section>

        <section class="admin-card">
          <h3 class="section-title">Div Rows</h3>
          <div id="rows"></div>
        </section>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn3.devexpress.com/jslib/25.1.6/js/dx.all.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
