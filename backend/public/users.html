<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./users.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="header">
        <h1>User Management</h1>
        <div class="nav-links">
          <a href="/">Dashboard</a>
          <a href="/admin">Schema Admin</a>
          <button id="btnLogout" type="button">Logout</button>
        </div>
      </div>

      <section class="panel">
        <div class="grid">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" />
          </div>
          <button id="btnCreate" type="button">Add User</button>
        </div>
      </section>

      <section class="panel">
        <h3 class="section-title">Users</h3>
        <table>
          <thead>
            <tr>
              <th>Username</th>
              <th>Created</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="userRows"></tbody>
        </table>
      </section>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn3.devexpress.com/jslib/25.1.6/js/dx.all.js"></script>
    <script src="./users.js"></script>
  </body>
</html>
