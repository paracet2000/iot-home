<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SmartHome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="header">
        <h1>SmartHome Login</h1>
      </div>

      <section class="login-card">
        <div class="login-grid">
          <div>
            <label for="username">Username</label>
            <input id="username" autocomplete="username" />
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" />
          </div>
        </div>
        <div class="login-actions">
          <button id="btnLogin" type="button">Login</button>
          
        </div>
        
      </section>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn3.devexpress.com/jslib/25.1.6/js/dx.all.js"></script>
    <script src="./login.js"></script>
  </body>
</html>
